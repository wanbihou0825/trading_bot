[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = 
    -v
    --tb=short
    --strict-markers
    --cov=core
    --cov=services
    --cov=strategies
    --cov=utils
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=70

[tool:coverage:run]
source = .
omit = 
    tests/*
    venv/*
    .venv/*
    */__pycache__/*
    */migrations/*

[tool:coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

[tool:black]
line-length = 100
target-version = ['py39', 'py310', 'py311']

[tool:isort]
profile = black
line_length = 100
